# Blueprint для https://render.com — «New» → «Blueprint» → подключить репозиторий
services:
  - type: web
    name: hyperliquid-trader
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: FUNDS_REQUIRE_APPROVALS
        value: "false"
      # После первого деплоя добавьте в Render Dashboard → Environment:
      # ALLOWED_HOSTS = <имя-сервиса>.onrender.com
      # CSRF_TRUSTED_ORIGINS = https://<имя-сервиса>.onrender.com
